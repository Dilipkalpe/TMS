# Host nginx — TMS on nip.io subdomain (multi-app VPS)
# Install:
#   sudo cp deploy/nginx-tms-nipio.conf /etc/nginx/sites-available/tms-nipio
#   sudo ln -sf /etc/nginx/sites-available/tms-nipio /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # removes "Welcome to nginx!" page
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires TMS running: docker compose exposes tms-web on host port 8080

server {
    listen 80;
    server_name tms.144.91.98.218.nip.io;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
