# Demo TMS — API (demo-api-tms.company.com)

upstream demo_tms_api {
    server 127.0.0.1:5201;
    keepalive 32;
}

server {
    listen 80;
    server_name demo-api-tms.company.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name demo-api-tms.company.com;

    ssl_certificate     /etc/letsencrypt/live/demo-api-tms.company.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo-api-tms.company.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25M;

    location / {
        proxy_pass http://demo_tms_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
