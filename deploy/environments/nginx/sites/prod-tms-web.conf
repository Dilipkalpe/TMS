# Production TMS — frontend (tms.company.com)
# Install: ln -sf .../prod-tms-web.conf /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d tms.company.com

upstream prod_tms_web {
    server 127.0.0.1:8101;
    keepalive 16;
}

server {
    listen 80;
    server_name tms.company.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tms.company.com;

    ssl_certificate     /etc/letsencrypt/live/tms.company.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tms.company.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25M;

    location / {
        proxy_pass http://prod_tms_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
